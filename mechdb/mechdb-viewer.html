---
layout: template.njk
title: MechDB Viewer
permalink: mechdb/viewer/
---
<style>
    .content-wrapper {
      overflow: hidden;
    }

    .part-table {
      height: calc(100vh - 22rem);
      overflow: hidden;
    }
</style>
<div class="part-search">
  <div class="d-flex m-10">
    <a href="#modal-1" onclick="showHelp()">ℹ️</a>
    <p class="m-0 mr-10">&nbsp;Search: </p>
    <input type='search' class='form-control' id='mechdb-search' placeholder='Search MechDB'>
  </div>
  <div class="d-flex m-10">
      <p class="m-0 mr-10">Filters: </p>
      <select class="form-control" style="max-width: 200px;" id="type-select" onchange="setFilter('type', type_select.value)">
          <option value="Any" selected="selected">Any</option>
          <option value="Frame">Frame</option>
          <option value="Plating">Plating</option>
          <option value="Cabin">Cabin</option>
          <option value="Mainframe">Mainframe</option>
          <option value="Module">Module</option>
          <option value="Cooler">Cooler</option>
          <option value="Power Plant">Power Plant</option>
          <option value="Tank">Tank</option>
          <option value="Weapon">Weapon</option>
          <option value="Equipment">Equipment</option>
      </select>
      &nbsp;
      <select class="form-control" style="max-width: 200px;" id="mfg-select" onchange="setFilter('manufacturer', mfg_select.value)">
          <option value="Any" selected="selected">Any</option>
          <option value="Bardtronics">Bardtronics</option>
          <option value="BMI Standards Co">BMI Standards Co</option>
          <option value="Iriscorp">Iriscorp</option>
          <option value="Scorpio Logistics">Scorpio Logistics</option>
          <option value="Protos Industries">Protos Industries</option>
          <option value="Perwares Electronics">Perwares Electronics</option>
          <option value="Progressive Globotech">Progressive Globotech</option>
          <option value="Nadornia Cybernetics">Nadornia Cybernetics</option>
          <option value="Moscow Instruments">Moscow Instruments</option>
          <option value="Nebulon Inc">Nebulon Inc</option>
          <option value="Ultraco">Ultraco</option>
          <option value="Cryobank">Cryobank</option>
          <option value="Apex Integration">Apex Integration</option>
          <option value="Anpidor Energies">Anpidor Energies</option>
          <option value="Kasosonic">Kasosonic</option>
          <option value="ESC Group">ESC Group</option>
          <option value="Ter Threpnicus Industries">Ter Threpnicus Industries</option>
          <option value="Atlas Power">Atlas Power</option>
          <option value="Stigma Manufacturing">Stigma Manufacturing</option>
          <option value="Familiar Industries">Familiar Industries</option>
          <option value="Vincent's">Vincent's</option>
          <option value="Erimos Mining Corp.">Erimos Mining Corp.</option>
      </select>
  </div>
  <div class="part-table overflow-y-scroll overflow-x-scroll part-table" style="width: 100%;">
    <table class='table' id='results'></table>
  </div>
</div>

<script src='{{site.url}}/jsonpath-0.8.0.js'></script>
<script src='{{site.url}}/mechdb.js'></script>
<script>
  type_select = document.getElementById('type-select');
  mfg_select = document.getElementById('mfg-select');
  use_select_column = false;
  select_column_header = 'compare';
  select_column_button_text = '⤭';
  loadDataFile('/mechdb/parts.json');
  function showHelp() {
    modal_title.innerHTML = 'Parts Database Search Help';
    modal_content.innerHTML = '<p>This part viewer allows you to search all the different mech parts for building your mech.<br>The search function supports both normal text searching and <a href=\"https://goessner.net/articles/JsonPath/\">JSONPath</a> searching (any search prefixed with a $ will be treated as a JSONPath).</p>';
  }
</script>
